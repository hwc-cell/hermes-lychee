appId: com.nousresearch.hermes
productName: Hermes Lychee
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/build/Release/*.node
win:
  executableName: hermes-agent
  target:
    - nsis
    - portable
portable:
  artifactName: ${name}-${version}-portable.${ext}
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: true
  perMachine: false
mac:
  artifactName: ${name}-${version}-${arch}-${os}.${ext}
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
    - rpm
  maintainer: hwc-cell
  vendor: Hermes Lychee
  category: Utility
  synopsis: 基于 hermes-desktop 的中文本地化 AI 智能桌面助手
  description: >-
    Hermes Lychee 是基于 fathah/hermes-desktop 的中文本地化魔改版，
    开箱支持国产大模型，面向小白用户。
appImage:
  artifactName: ${name}-${version}.${ext}
deb:
  # Run chmod 4755 on chrome-sandbox so Electron's setuid sandbox helper
  # works on modern Linux distros that disable unprivileged user
  # namespaces (Ubuntu 24.04+, etc.). Closes #395.
  afterInstall: build/linux-after-install.sh
rpm:
  artifactName: ${name}-${version}.${ext}
  # Same SUID fix for .rpm consumers (Fedora 40+ also restricts userns).
  afterInstall: build/linux-after-install.sh
npmRebuild: false
publish:
  provider: github
  owner: hwc-cell
  repo: hermes-lychee
